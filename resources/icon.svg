<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171B27"/>
      <stop offset="1" stop-color="#0B0D12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.44" r="0.62">
      <stop offset="0" stop-color="#818CF8" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="void" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#05060A"/>
      <stop offset="1" stop-color="#0A0C12"/>
    </radialGradient>
  </defs>

  <!-- App squircle -->
  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#bg)"/>
  <rect x="65" y="65" width="894" height="894" rx="207" fill="none" stroke="#2B3454" stroke-width="2"/>
  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#glow)"/>

  <!-- Abyss: concentric rings receding into a void (offset downward for depth) -->
  <g fill="none">
    <circle cx="512" cy="496" r="298" stroke="#818CF8" stroke-opacity="0.16" stroke-width="26"/>
    <circle cx="512" cy="506" r="230" stroke="#818CF8" stroke-opacity="0.30" stroke-width="26"/>
    <circle cx="512" cy="516" r="166" stroke="#8E97FA" stroke-opacity="0.48" stroke-width="26"/>
    <circle cx="512" cy="526" r="108" stroke="#A8AEFF" stroke-opacity="0.78" stroke-width="24"/>
  </g>
  <circle cx="512" cy="534" r="64" fill="url(#void)"/>
</svg>
